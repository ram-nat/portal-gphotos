name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      id: decode_keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$ENCODED_STRING" ]; then
          echo "$ENCODED_STRING" | base64 -d > release.jks
          echo "keystore_decoded=true" >> $GITHUB_OUTPUT
        else
          echo "keystore_decoded=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up keystore.properties
      if: steps.decode_keystore.outputs.keystore_decoded == 'true'
      env:
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      run: |
        echo "storeFile=${GITHUB_WORKSPACE}/release.jks" > keystore.properties
        echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
        echo "keyAlias=$KEY_ALIAS" >> keystore.properties
        echo "keyPassword=$KEY_PASSWORD" >> keystore.properties

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Determine APK path
      id: apk_path
      run: |
        if [ "${{ steps.decode_keystore.outputs.keystore_decoded }}" == "true" ]; then
          echo "apk_file=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
        else
          echo "apk_file=app/build/outputs/apk/release/app-release-unsigned.apk" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.apk_path.outputs.apk_file }}
        generate_release_notes: true
